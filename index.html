<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Enthusiast 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    :root {
        --bg: #0a0a0a;
        --surface: #1a1a1a;
        --text: #ffffff;
        --accent-red: #ff4d4d;
        --accent-blue: #4d94ff;
        --border: #333;
        --sidebar-width: 260px;
    }

    body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
    }

    nav {
        width: var(--sidebar-width);
        background: #000;
        border-right: 1px solid var(--border);
        height: 100vh;
        position: fixed;
        display: flex;
        flex-direction: column;
        padding: 40px 20px;
        box-sizing: border-box;
        z-index: 100;
    }

    .nav-logo {
        font-weight: 900;
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 50px;
        color: var(--accent-red);
    }

    .nav-links { list-style: none; padding: 0; margin: 0; }
    .nav-item {
        padding: 15px 0;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        color: #888;
        cursor: pointer;
        transition: 0.3s;
        border-bottom: 1px solid transparent;
    }
    .nav-item:hover, .nav-item.active { color: white; padding-left: 10px; }
    .nav-item.active { border-bottom: 1px solid var(--accent-red); }

    main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; position: relative; }

    .page-section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; max-width: 1200px; margin: 0 auto; }
    .page-section.active { display: block; opacity: 1; }

    .home-hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; }
    .hero-title { font-size: 5rem; font-weight: 900; margin: 0; line-height: 0.8; text-transform: uppercase; }    

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .card { background: var(--surface); padding: 25px; border-radius: 4px; border: 1px solid var(--border); }     
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.8rem; text-transform: uppercase; color: #888; margin-bottom: 5px; }      
    input, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; }
    .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .slider-box span { float: right; color: var(--accent-blue); font-weight: bold; }
    button { width: 100%; padding: 15px; margin-top: 20px; background: white; color: black; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--accent-blue); color: white; }
    .chart-container { position: sticky; top: 20px; height: 80vh; }
    .controls { width: 100%; margin: 40px 0 20px 0; display: flex; gap: 15px; }
    .drink-grid { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .drink-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: 0.3s; cursor: pointer; }
    .drink-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
    .drink-card.active { border: 2px solid var(--accent-red); }
    .drink-img { width: 100%; height: 200px; background: #000; object-fit: contain; border-bottom: 1px solid var(--border); }
    .drink-info { padding: 15px; position: relative; }
    .drink-info h3 { margin: 0; font-size: 1.1rem; }
    .drink-info p { margin: 5px 0; font-size: 0.8rem; color: #888; }
    .score-pill { display: inline-block; padding: 2px 8px; background: var(--accent-red); font-size: 0.7rem; font-weight: bold; border-radius: 2px; margin-top: 10px; }
    .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.2); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2px 6px; font-size: 0.6rem; border-radius: 3px; cursor: pointer; z-index: 10; }    
    .admin-section { width: 100%; margin-top: 50px; padding-top: 20px; border-top: 1px dashed var(--border); text-align: center; }
    .export-box { display: none; background: #000; color: #0f0; padding: 15px; text-align: left; font-family: monospace; font-size: 0.8rem; margin-top: 15px; white-space: pre-wrap; border: 1px solid #333; }
    .dashboard { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr 1.5fr; gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
    .stat-card h4 { margin: 0; font-size: 0.7rem; text-transform: uppercase; color: #888; letter-spacing: 1px; }  
    .stat-card .stat-value { font-size: 2rem; font-weight: 900; color: var(--accent-blue); margin: 5px 0; }       
    .spotlight-card { background: linear-gradient(45deg, #1a1a1a, #2a2315); border: 1px solid #d4af37; position: relative; overflow: hidden; display: flex; align-items: center; gap: 15px; padding: 15px; }
    .spotlight-card::after { content: "HALL OF FAME"; position: absolute; top: 10px; right: -25px; background: #d4af37; color: black; font-size: 0.6rem; font-weight: bold; padding: 2px 30px; transform: rotate(45deg); }
    .spotlight-img { height: 80px; width: 60px; object-fit: contain; background: #000; border-radius: 2px; }      
    .spotlight-info h3 { margin: 0; font-size: 1rem; color: #d4af37; }
    .spotlight-info p { margin: 2px 0; font-size: 0.7rem; color: #aaa; }

    @media (max-width: 900px) {
        body { flex-direction: column; }
        nav { width: 100%; height: auto; position: relative; padding: 20px; border-bottom: 1px solid var(--border); }
        main { margin-left: 0; padding: 20px; }
        .nav-links { display: flex; gap: 20px; }
        .layout { grid-template-columns: 1fr; }
        .dashboard { grid-template-columns: 1fr 1fr; }
    }
    </style>
</head>

<body>
    <nav>
        <div class="nav-logo">EE.2.0</div>
        <ul class="nav-links">
            <li class="nav-item active" onclick="showPage('home')">Home</li>
            <li class="nav-item" onclick="showPage('vault')">The Vault</li>
            <li class="nav-item" onclick="showPage('about')">About</li>
        </ul>
    </nav>

    <main>
        <section id="home" class="page-section active">
            <div class="home-hero">
                <h1 class="hero-title">Wired<br>Different.</h1>
                <p class="hero-subtitle" style="font-size: 1.5rem; color: #888; margin: 20px 0 40px 0;">Welcome to Energy Enthusiast. A dedicated space for the science, flavor, and design of energy.</p>
                <button class="launch-btn" style="width: fit-content;" onclick="showPage('vault')">ENTER THE VAULT -></button>
            </div>
        </section>

        <section id="vault" class="page-section">
            <h1 style="border-left: 8px solid var(--accent-red); padding-left: 15px; text-transform: uppercase;">The Vault</h1>
            
            <div class="dashboard">
                <div class="stat-card">
                    <h4>Total Rated</h4>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <h4>Avg Rating</h4>
                    <div class="stat-value" id="stat-avg">0.0</div>
                </div>
                <div class="stat-card">
                    <h4>Top Brand</h4>
                    <div class="stat-value" id="stat-brand" style="font-size: 1.2rem;">None</div>
                </div>
                <div class="stat-card spotlight-card" id="hall-of-fame">
                    <img src="" class="spotlight-img" id="hof-img">
                    <div class="spotlight-info">
                        <p id="hof-brand">BRAND</p>
                        <h3 id="hof-name">Drink Name</h3>
                        <div class="score-pill" style="background: #d4af37; color: black;" id="hof-score">0.0/10</div>    
                    </div>
                </div>
            </div>

            <div class="layout">
                <div class="card">
                    <div class="input-group">
                        <label>Drink Name</label>
                        <input type="text" id="name" placeholder="e.g. Ghost">
                    </div>
                    <div class="input-group">
                        <label>Brand</label>
                        <input type="text" id="brand" placeholder="e.g. Ghost">
                    </div>
                    <div class="input-group">
                        <label>Image URL</label>
                        <input type="text" id="imgUrl" placeholder="Link...">
                    </div>
                    <div class="sliders">
                        <div class="slider-box"><label>Design: <span id="v1">5</span></label><input type="range" id="s1" min="1" max="10" value="5" step="0.1" oninput="updateVal(1)"></div>
                        <div class="slider-box"><label>Accuracy: <span id="v2">5</span></label><input type="range" id="s2" min="1" max="10" value="5" step="0.1" oninput="updateVal(2)"></div>
                        <div class="slider-box"><label>Taste: <span id="v3">5</span></label><input type="range" id="s3" min="1" max="10" value="5" step="0.1" oninput="updateVal(3)"></div>
                        <div class="slider-box"><label>Overall: <span id="v4">5</span></label><input type="range" id="s4" min="1" max="10" value="5" step="0.1" oninput="updateVal(4)"></div>
                    </div>
                    <button onclick="saveDrink()">Add to Vault</button>
                </div>
                <div class="card chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="controls">
                <input type="text" id="filterText" placeholder="Search..." oninput="renderGrid()">       
            </div>
            <div class="drink-grid" id="drinkGrid"></div>
        </section>

        <section id="about" class="page-section">
            <h1 style="border-left: 8px solid var(--accent-red); padding-left: 15px; text-transform: uppercase;">About</h1>
            <div class="card" style="margin-top: 30px;"><p>Energy Enthusiast 2.0 is your personal vault.</p></div>
        </section>
    </main>

    <script>
        const PUBLIC_DRINKS = [{"id":1776973202070,"name":"Raspberry Cream","brand":"Ghost","img":"https://completehealthshop.com/cdn/shop/files/ghost_energy_drink_raspberry_cream_530x.png?v=1772332332","scores":[10,8.4,8.9,9.2]},{"id":1776973316281,"name":"Freedom Punch","brand":"Black Rifle Energy","img":"https://storage.googleapis.com/images-prs-prd-c7e7986.prs.prd.v8.commerce.mi9cloud.com/product-images/zoom/00810140157713_1","scores":[9.6,5.4,5.8,6.1]},{"id":1777003215388,"name":"Original","brand":"Ghost","img":"https://drinkghost.com/cdn/shop/files/OGFront_b5090f47-67f3-4a61-9c9d-43229be0709c_700x.webp?v=1756221881","scores":[7,1,6.9,7]},{"id":1777003296892,"name":"Blue Raspberry","brand":"Sparkling Ice Caffine","img":"https://d3koznjjgilbyx.cloudfront.net/lowesfoods/product_images/0001657195384.jpg","scores":[5.3,7.2,6.8,6.9]},{"id":1777003842931,"name":"Black Raspberry","brand":"Sparking Ice Caffine","img":"https://www.sparklingice.com/wp-content/uploads/2025/12/Black-Raspberry-Caffeine.webp","scores":[5,7.7,7.1,7.2]},{"id":1777003991171,"name":"Cherry Slush","brand":"Alani","img":"https://www.alaninu.com/cdn/shop/files/energy_1serve_cherryslush_web_600x.png?v=1691680468","scores":[8,7.1,8.4,8.1]},{"id":1777004082776,"name":"Alani","brand":"Orange Kiss","img":"https://www.alaninu.com/cdn/shop/files/Orange_Kiss_Energy-ProductFrontV2_600x.png?v=1708990699","scores":[8.9,7.2,6.8,7.3]},{"id":1777004143878,"name":"Ghost","brand":"Orange Cream","img":"https://bevmo.com/cdn/shop/files/40ea375d-fc4a-4a2e-9114-202e1a757eb1.png?v=1773692690&width=1445","scores":[10,7.8,7.2,7.1]},{"id":1777004214254,"name":"Ghost ","brand":"Swedish Fish","img":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5oLvfx8tXmodeYiK8B2miCcpsgwdcGCM_1w&s","scores":[8,9.8,7.9,8.2]},{"id":1777004270888,"name":"Ghost","brand":"Warhead Sour Watermelon","img":"https://drinkghost.com/cdn/shop/files/WarheadsSWFront_700x.webp?v=1744834631","scores":[10,9.4,7.4,7.8]},{"id":1777004424991,"name":"Alani","brand":"Peach","img":"https://www.alaninu.com/cdn/shop/files/energy_1serve_Peach_web_1200x.png?v=1691680844","scores":[7.6,9.5,6.3,6.5]},{"id":1777004485548,"name":"Alani","brand":"Strawberry Sunrise","img":"https://www.alaninu.com/cdn/shop/files/Updated_new_Strawberry_Sunrise_PDP_600x.png?v=1738186829","scores":[9.6,7.8,8.7,8.4]},{"id":1777004571034,"name":"Strawbango","brand":"Ghost","img":"https://drinkghost.com/cdn/shop/files/StrawbangoFront.webp?v=1744833958&width=1200","scores":[10,8.3,8.1,8.1]},{"id":1777004814605,"name":"Sour Patch Kids Blue Raspberry","brand":"Ghost","img":"https://i5.walmartimages.com/seo/GHOST-ENERGY-Zero-Sugars-Energy-Drink-SOUR-PATCH-KIDS-Blue-Raspberry-16-fl-oz-Can_aba4647d-f190-4a7c-af4b-8fe63466b970.a2285526e4a5cb7dda2b82476e8d7f3b.png?odnHeight=768&odnWidth=768&odnBg=FFFFFF","scores":[10,8.2,8.6,8.5]},{"id":1777004864824,"name":"Sour Patch Kids Redberry","brand":"Ghost","img":"https://www.happysliquor.com/cdn/shop/files/GHOST_ENERGY_SPK_REDBERRY_1242x1674_b8fabdeb-7851-41ec-af2a-7442617c658c.webp?v=1742326242","scores":[10,9.1,8.6,8.8]},{"id":1777004945135,"name":"Welch's Grape-Cran","brand":"Ghost","img":"https://drinkghost.com/cdn/shop/files/WelchsGrapeCran_700x.webp?v=1765816503","scores":[10,8.3,8.7,8.4]}];
        let localDrinks = JSON.parse(localStorage.getItem('energyDrinks')) || [];
        let drinks = [];
        let activeComparison = [];

        function mergeDrinks() {
            drinks = [...PUBLIC_DRINKS];
            localDrinks.forEach(ld => { if (!drinks.find(pd => pd.id === ld.id)) drinks.push(ld); });
        }

        const ctx = document.getElementById('radarChart').getContext('2d');
        let radarChart = new Chart(ctx, {
            type: 'radar',
            data: { labels: ['Design', 'Accuracy', 'Taste', 'Overall'], datasets: [] },
            options: { maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 10, grid: { color: '#333' }, angleLines: { color: '#333' }, pointLabels: { color: '#fff' }, ticks: { display: false } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        });

        function updateVal(n) { document.getElementById(`v${n}`).textContent = document.getElementById(`s${n}`).value; }

        function saveDrink() {
            const d = { id: Date.now(), name: document.getElementById('name').value, brand: document.getElementById('brand').value, img: document.getElementById('imgUrl').value || 'https://via.placeholder.com/250x200', scores: [parseFloat(document.getElementById('s1').value), parseFloat(document.getElementById('s2').value), parseFloat(document.getElementById('s3').value), parseFloat(document.getElementById('s4').value)] };
            if (!d.name) return alert("Name!");
            localDrinks.push(d);
            localStorage.setItem('energyDrinks', JSON.stringify(localDrinks));
            renderGrid();
        }

        function toggleComparison(id) {
            const idx = activeComparison.indexOf(id);
            if (idx > -1) activeComparison.splice(idx, 1);
            else { if (activeComparison.length >= 3) activeComparison.shift(); activeComparison.push(id); }
            renderGrid();
        }

        function renderGrid() {
            mergeDrinks();
            const grid = document.getElementById('drinkGrid');
            grid.innerHTML = drinks.filter(d => d.name.toLowerCase().includes(document.getElementById('filterText').value.toLowerCase())).map(d => `
                <div class="drink-card ${activeComparison.includes(d.id) ? 'active' : ''}" onclick="toggleComparison(${d.id})">
                    <img src="${d.img}" class="drink-img">
                    <div class="drink-info">
                        <p>${d.brand}</p><h3>${d.name}</h3>
                        <div class="score-pill">${d.scores[3]}/10</div>
                    </div>
                </div>
            `).join('');
            updateChart();
            updateDashboard();
        }

        function updateChart() {
            const colors = [{b: '#ff4d4d', g: 'rgba(255, 77, 77, 0.2)'}, {b: '#4d94ff', g: 'rgba(77, 148, 255, 0.2)'}, {b: '#fff', g: 'rgba(255, 255, 255, 0.1)'}];
            radarChart.data.datasets = activeComparison.map((id, i) => {
                const d = drinks.find(dr => dr.id === id);
                return d ? { label: d.name, data: d.scores, borderColor: colors[i].b, backgroundColor: colors[i].g, borderWidth: 2 } : null;
            }).filter(d => d);
            radarChart.update();
        }

        function updateDashboard() {
            if (!drinks.length) return;
            document.getElementById('stat-total').textContent = drinks.length;
            document.getElementById('stat-avg').textContent = (drinks.reduce((a, b) => a + b.scores[3], 0) / drinks.length).toFixed(1);
            const hof = [...drinks].sort((a, b) => b.scores[3] - a.scores[3])[0];
            document.getElementById('hof-img').src = hof.img;
            document.getElementById('hof-name').textContent = hof.name;
            document.getElementById('hof-score').textContent = hof.scores[3] + "/10";
        }

        function showPage(id) {
            const cur = document.querySelector('.page-section.active');
            const next = document.getElementById(id);
            if (cur === next) return;
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                if (i.getAttribute('onclick').includes(id)) i.classList.add('active');
            });
            cur.style.opacity = "0";
            setTimeout(() => {
                cur.classList.remove('active');
                next.classList.add('active');
                setTimeout(() => { next.style.opacity = "1"; if (id === 'vault') { renderGrid(); radarChart.resize(); } }, 50);
            }, 400);
        }
        renderGrid();
    </script>
</body>
</html>
